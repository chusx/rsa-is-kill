# imapd.conf — Cyrus IMAP server TLS configuration.
#
# Cyrus is the open-source IMAP/POP/Submission/Sieve server that powers
# Fastmail, CMU, and a long tail of universities and ISPs with mailbox
# counts in the tens of millions. The TLS context built from these
# directives drives the RSA handshakes in `cyrus_tls_rsa.c`.

configdirectory:        /var/lib/cyrus
partition-default:      /var/spool/cyrus
sievedir:               /var/lib/cyrus/sieve

# ---- Listeners ----
servicename_imap:       imap
servicename_imaps:      imaps       # port 993 implicit TLS
servicename_submission: submission  # port 587 STARTTLS

# ---- TLS material ----
#
# Wildcard cert for *.mail.example.com issued by a public CA
# (Let's Encrypt / DigiCert). Renewed via the usual ACME / CertCentral
# flow; cyr_deliver HUPs the master on rotation.
tls_server_cert:        /etc/ssl/cyrus/mail.example.com.crt
tls_server_key:         /etc/ssl/cyrus/mail.example.com.key   # RSA-2048
tls_client_ca_dir:      /etc/ssl/certs

# STARTTLS is REQUIRED on plaintext ports (RFC 8314 conformance).
allowplaintextloginwithouttls: 0
tls_required:           1

# Session cache — shared across Cyrus children for handshake reuse.
tls_sessions_db:        twoskip
tls_session_timeout:    1440        # minutes

# ---- SASL mechanisms that depend on the TLS channel ----
#
# PLAIN / LOGIN are only offered inside TLS; CRAM-MD5 + SCRAM-SHA-256
# are offered unconditionally. Enterprise deployments add GSSAPI (MIT
# Kerberos) for SSO.
sasl_mech_list:         PLAIN LOGIN SCRAM-SHA-256 GSSAPI
sasl_minimum_layer:     0

# ---- Murder / backend aggregation ----
#
# Front-ends proxy to back-end spool servers over mupdate. That
# mupdate link is also TLS with the same RSA server cert. A factoring
# break lets an attacker impersonate a back-end spool and silently
# steal or inject mail as it transits the Murder mesh.
mupdate_server:         mupdate.mail.example.internal
mupdate_authname:       mupdate_user
proxy_authname:         proxy_user

# ---- Submission relay to outbound MTA ----
#
# Submitted mail is handed to Postfix over a loopback TLS connection
# that also rides `cyrus_tls_rsa.c`.
lmtp_deliver_module:    lmtpunix

# If RSA breaks every IMAP/POP/Submission/mupdate/LMTP handshake above
# becomes forgeable in both directions — TLS no longer provides
# confidentiality or authentication for the mail plant.
