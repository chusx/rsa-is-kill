# smb.conf for a Samba AD DC — shows where the RSA primitives in
# `samba_rsa_auth.c` actually run. Samba-AD is deployed as the primary
# identity backend in tens of thousands of Linux-shop AD forests
# (FreeIPA trusts, university networks, hospital IT domains, small-
# and mid-business that prefer not to run Windows Server) and as the
# drop-in replacement for NT4 PDCs in legacy industrial sites.
#
# Touchpoints to RSA:
#   - The NETLOGON secure channel carries the machine-account
#     credential; modern clients use AES+RSA schannel binding.
#   - LDAPS on 636 and Global Catalog on 3269 present the DC's
#     RSA-2048 server cert issued by the AD-integrated Enterprise CA.
#   - Kerberos PKINIT pre-auth (see `kerberos-pkinit/`) validates
#     smartcard-logon RSA certs through the same CA chain.
#   - DRSUAPI replication between DCs runs over an RPC+TLS channel
#     whose mutual auth uses the DCs' own RSA machine certs.

[global]
    workgroup = CORP
    realm = CORP.EXAMPLE.COM
    netbios name = DC01
    server role = active directory domain controller
    server services = -dns, s3fs, rpc, nbt, wrepl, ldap, cldap, kdc, drepl, winbindd, ntp_signd, kpasswdd, dnsupdate
    dns forwarder = 10.0.0.53

    # TLS for LDAPS (636) and GC-LDAPS (3269).  Leaf + chain issued
    # by the enterprise ADCS CA; see adcs-windows/ for the CA side.
    tls enabled  = yes
    tls keyfile  = tls/dc01.key
    tls certfile = tls/dc01.crt
    tls cafile   = tls/corp-rootca.crt
    tls crlfile  = tls/corp-crl.pem
    tls verify peer = ca_and_name_if_available

    # Kerberos + PKINIT.  Smartcard logon validates the user's
    # PIV/CAC RSA cert against the NTAuth store replicated into the
    # directory.
    kdc enable pkinit = yes
    kdc pkinit kdc certificate = tls/dc01-kdc.crt
    kdc pkinit kdc private key = tls/dc01-kdc.key
    kdc pkinit anchors = FILE:tls/corp-rootca.crt

    # NETLOGON secure-channel binding: AES + schannel
    server schannel = yes
    reject md5 clients = yes

    # LDAP signing mandatory; deflects the well-known NTLM relay
    # downgrade.
    ldap server require strong auth = yes

    # Passwords replicate to RODCs only if the RODC filter allows; the
    # KDC RSA cert gates PKINIT there too.
    password server = *

[netlogon]
    path = /var/lib/samba/sysvol/corp.example.com/scripts
    read only = no

[sysvol]
    path = /var/lib/samba/sysvol
    read only = no


# ---- Operational integration ----
#
# - `samba-tool domain provision --use-rfc2307 ...` builds the
#   directory and stands up the initial DC cert.
# - `samba-tool domain exportkeytab /etc/krb5.keytab` emits the
#   krbtgt and machine keys.
# - certmonger (on RHEL/Rocky AD-DC deployments) keeps the DC and KDC
#   RSA certs rotated against the enterprise CA; Samba is SIGHUP'd
#   to reload on renewal.
# - Replication between DCs tunnels DRSUAPI over RPC-over-SMB with
#   schannel, whose session key is bound to the RSA-backed DC cert
#   chain.
#
# ---- Breakage ----
#
# An RSA factoring attack against the enterprise Root CA forging the
# DC's certificate lets an attacker:
#   - Stand up a rogue DC, join the replication topology, exfiltrate
#     the entire NTDS.dit (every AD password hash in the forest)
#     via DRSUAPI GetNCChanges — a golden-ticket precursor but
#     straight from LDAP.
#   - Pass a forged KDC cert through PKINIT and mint TGTs for
#     arbitrary users without knowing any password.
#   - Impersonate LDAPS to domain-joined workstations, intercept
#     group-policy / logon-script pulls, and inject a malicious
#     startup script onto every machine.
