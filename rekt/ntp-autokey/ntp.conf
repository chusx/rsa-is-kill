# ntp.conf — reference NTP daemon stanza that exercises the Autokey
# RSA primitives in `ntpd_autokey_rsa.c`.  Historically distributed as
# the example config on RHEL 6/7, Solaris 11, and HP-UX 11i ntp
# packages; still present on long-lived enterprise time-service rigs.
#
# NTPv4 Autokey uses per-host RSA-2048 keypairs to authenticate
# association messages — defense against off-path packet-injection
# attacks on broadcast / multicast time service. Has been superseded
# by NTS (Network Time Security) in most modern deployments, but
# Autokey is still running on:
#   - Stratum-1 GPS appliances (Meinberg LANTIME, Microsemi TimeProvider
#     4100, Orolia SecureSync — older firmware)
#   - Federal-civilian time sources (NIST ACTS dial-up sync modems)
#   - Military GCCS-J / DoD-wide stratum-2 fanout
#   - Power utility substation time sync where NERC CIP-007 R4 mandates
#     authenticated time
#   - Financial trading floor clocks (MiFID II RTS 25 microsecond
#     traceability — NYSE / Nasdaq colocation racks)

# ---- Time sources ----
server 0.pool.ntp.org iburst autokey
server 1.pool.ntp.org iburst autokey
server time.nist.gov  iburst autokey
server tick.usno.navy.mil autokey prefer

# ---- Autokey configuration ----
#
# ntp-keygen pre-generates the RSA host key, IFF/GQ/MV group keys,
# and a server certificate under the host key.
crypto pw ${AUTOKEY_PW}
keysdir /etc/ntp/autokey
crypto host  /etc/ntp/autokey/ntpkey_host_ntp1.corp.example.com
crypto cert  /etc/ntp/autokey/ntpkey_cert_ntp1.corp.example.com
crypto iff   /etc/ntp/autokey/ntpkey_iffkey_corp.example.com

# ---- Broadcast stratum-2 serving the subnet ----
broadcast 192.168.42.255 autokey

# ---- Access control ----
restrict default nomodify notrap nopeer noquery
restrict 127.0.0.1
restrict ::1
restrict 192.168.42.0 mask 255.255.255.0 nomodify notrap

# ---- Drift / stats ----
driftfile /var/lib/ntp/drift
statsdir  /var/log/ntpstats/
statistics loopstats peerstats clockstats cryptostats
filegen   cryptostats file cryptostats type day enable

# ---- Breakage ----
#
# Autokey's RSA signatures authenticate every mode-bit transition in
# the association state machine (ASSOC → COOKIE → AUTO → VALID →
# SYNC). A factoring attack on a stratum-1 host's RSA-2048 identity
# key lets an attacker:
#   - Forge authenticated time adjustments on the downstream
#     stratum-2 fanout, skewing time by arbitrary offsets
#   - Defeat NERC CIP-007 R4 + MiFID II RTS 25 auditability —
#     signed timestamps in SCADA event logs and market trade
#     ledgers become untrustworthy
#   - Break Kerberos clock-skew bounds, PKI OCSP thisUpdate logic,
#     MFA TOTP validation, certificate expiry enforcement
# The stratum-1 operator list is short enough (ntp.org pool + GPS
# appliance vendor CAs + national labs) that a targeted RSA break
# against a tier-1 time authority is a nation-state-scale capability.
