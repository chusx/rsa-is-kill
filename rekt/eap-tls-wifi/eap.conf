# eap.conf — FreeRADIUS 3.2 EAP module stanza driving enterprise
# 802.1X EAP-TLS (and EAP-TTLS / PEAP as inner-tunnel fallbacks).
# Paired with `freeradius_eap_tls.c` which implements the underlying
# RSA certificate validation.
#
# This is what runs on every enterprise RADIUS deployment:
#   - Cisco ISE, Aruba ClearPass, Microsoft NPS, Packetfence
#   - ISP wholesale 802.1X (eduroam national federations, hotspot 2.0
#     Passpoint carrier roaming: AT&T, Verizon, BT, DT, Orange, KT)
#   - Cloud-hosted RADIUS (JumpCloud, Meraki, Foxpass, SecureW2)

eap {
    default_eap_type = tls

    ignore_unknown_eap_types = no
    cisco_accounting_username_bug = no
    max_sessions = ${max_requests}

    # ---- EAP-TLS (the strong method — pure mutual cert auth) ----
    tls-config tls-common {
        # Server cert chain chaining to the enterprise root. Supplicants
        # pin this root via GPO / MDM Wi-Fi profile.
        private_key_password = ${private_key_password}
        private_key_file = /etc/freeradius/certs/radius.key   # RSA-2048
        certificate_file = /etc/freeradius/certs/radius.crt
        ca_file          = /etc/freeradius/certs/enterprise-ca-bundle.pem

        # Client cert validation
        cipher_list    = "HIGH:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!MD5:!PSK:!SRP"
        cipher_server_preference = yes
        tls_min_version = "1.2"
        tls_max_version = "1.3"

        # OCSP stapling against the enterprise CA's responder — avoids
        # per-auth CRL fetches for a fleet of 100k+ laptops/phones.
        ocsp {
            enable            = yes
            override_cert_url = yes
            url               = "http://ocsp.corp.example.com/"
            softfail          = no
        }

        # Session resumption — critical on Wi-Fi where AP roaming
        # triggers re-auth every few minutes per client.
        cache {
            enable           = yes
            lifetime         = 24     # hours
            store { Tunnel-Private-Group-Id }
        }

        # Split virtual server for per-tenant policy (role mapping
        # from the client cert's OU → VLAN).
        virtual_server = check-client-cert
    }

    tls {
        tls = tls-common
    }

    # ---- Inner-tunnel fallbacks for BYOD / unmanaged devices ----
    ttls {
        tls = tls-common
        default_eap_type = mschapv2
        virtual_server   = "inner-tunnel"
    }
    peap {
        tls = tls-common
        default_eap_type = mschapv2
        virtual_server   = "inner-tunnel"
    }
}

# ---- Typical integration ----
#
# Wi-Fi APs (Aruba/Meraki/Ruckus/Cisco Catalyst 9800) authenticate
# supplicants through this server; successful EAP-TLS yields a
# VLAN + ACL mapped from the client cert's Subject DN.
# Switched-port 802.1X works identically.  MacSec Connectivity
# Association Keys are derived from the EAP-TLS MSK in IEEE 802.1AE
# deployments (hi-sec sites: financial trading floors, classified
# enclaves).
#
# A factoring break on the enterprise CA lets an attacker forge a
# client cert for any user/device on the org, silently joining the
# corporate Wi-Fi / wired LAN at the identity of e.g. the CEO laptop
# or a domain controller. Every AP and access switch across the
# enterprise accepts the forged cert without any flag.
