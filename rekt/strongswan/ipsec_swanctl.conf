# ---- Breakage -------------------------------------------------------
#
# A factoring attack against:
#
# - **The AWS/Azure/GCP VPN root CA** (AWS VPN Root CA, Microsoft VPN
#   Root CA 2017, Google Cloud VPN Root CA): attacker forges a
#   strongSwan peer cert chaining to the same root and spins up a
#   rogue VPN endpoint DNS-identical to the real one. Every enterprise
#   on-prem strongSwan that uses `auth=pubkey` + `cacerts=aws-vpn-
#   root.crt` accepts the forged peer and establishes a tunnel into
#   the attacker's network. Corporate WAN traffic bleeds.
#
# - **The corp-emp-root CA** (the enterprise-employee-cert CA): the
#   attacker mints roadwarrior client certs and connects as arbitrary
#   named employees over EAP-TLS, landing inside the corporate
#   subnet without knowing any password or MFA secret.
#
# - **The per-concentrator RSA server cert**: attacker MITM's the
#   concentrator for a specific WAN link; all ESP payloads from the
#   far end (remote branch office, AWS VPC) decrypt into attacker
#   hands because IKEv2 pubkey auth is the only gate on ESP session-
#   key derivation. A factored server key means every past negotiated
#   ESP SA may be decryptable offline if the attacker captured the
#   IKEv2 exchange.
