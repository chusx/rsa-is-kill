# strongswan swanctl.conf — exercises `x509_cert_rsa_verify.c` on
# every tunnel bring-up. strongSwan is the dominant IKEv2
# implementation on Linux; shipped as the default IPsec daemon in:
#
# - Every OpenWrt router
# - Ubiquiti UniFi / EdgeOS UDM gateways
# - Mikrotik RouterOS (their fork)
# - AWS VPN CloudHub + AWS Site-to-Site VPN strongSwan sample configs
# - Azure VPN Gateway route-based tunnels (RSA cert auth mode)
# - Google Cloud HA-VPN to on-prem
# - Cisco Meraki MX <-> third-party AWS/Azure peerings
# - SecureCRT / pfSense / OPNsense IKEv2 server modes
# - Rancher, Cilium, Calico overlay encryption (wireguard preferred,
#   but strongSwan is the long-tail fallback in OpenShift + enterprise
#   CNI stacks)
# - Tens of thousands of corporate roadwarrior VPN concentrators

connections {

    # ---- Site-to-site to AWS us-east-1 VPC ----
    aws-use1 {
        version   = 2
        proposals = aes256gcm16-prfsha384-ecp384
        dpd_delay = 30s

        local {
            auth   = pubkey
            certs  = onprem-hq.crt        # RSA-2048 leaf
            id     = "C=US, O=Corp, CN=onprem-hq-vpn"
        }
        remote {
            auth     = pubkey
            cacerts  = aws-vpn-root.crt   # AWS VPN CA (RSA-2048)
            id       = "CN=vpn.us-east-1.amazonaws.com"
        }

        children {
            vpc-10-20 {
                local_ts  = 10.0.0.0/8
                remote_ts = 10.20.0.0/16
                esp_proposals = aes256gcm16
                start_action  = trap
                dpd_action    = restart
            }
        }
    }

    # ---- Roadwarrior: employee laptops, EAP-TLS inner ----
    rw-emp {
        version   = 2
        pools     = rw-pool
        proposals = aes256gcm16-prfsha384-ecp384

        local {
            auth  = pubkey
            certs = vpn-concentrator.crt   # RSA-2048 server cert
            id    = "vpn.corp.example.com"
        }
        remote {
            auth    = eap-tls           # inner cert auth = RSA as well
            id      = %any
            eap_id  = %any
        }

        children {
            all {
                local_ts  = 0.0.0.0/0
                remote_ts = 0.0.0.0/0
                esp_proposals = aes256gcm16
            }
        }
    }
}

# ---- Credentials & authorities --------------------------------------
authorities {
    aws-vpn-ca  { cacert = aws-vpn-root.crt }
    corp-emp-ca { cacert = corp-emp-root.crt
                  crl_uris = http://pki.corp.example.com/emp-crl.pem
                  ocsp_uris = http://ocsp.pki.corp.example.com }
}

pools {
    rw-pool { addrs = 10.99.99.0/24 ; dns = 10.0.0.53 }
}

