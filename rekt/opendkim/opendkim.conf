# opendkim.conf — production DKIM milter config. Paired with the RSA
# signing primitive in `opendkim_rsa_signing.c`.
#
# Runs on essentially every outbound SMTP relay of any consequence:
#   - Google Workspace MX-Out, Microsoft 365 EOP, Amazon SES
#     relay fleets
#   - Mailchimp, SendGrid, Mailgun, Postmark, SparkPost — mass-mail
#     ESPs signing billions of messages/day with per-tenant selectors
#   - Every enterprise on Postfix/Sendmail/Exim with milter-opendkim
#     (the SPF+DKIM+DMARC triad)
#
# Consumer inboxes (Gmail, Yahoo, Outlook.com, Apple iCloud) since
# Feb 2024 REQUIRE DKIM-authenticated inbound for bulk senders — no
# valid DKIM signature = relegation to junk / deferral / bounce. A
# factoring attack on a high-volume sender's DKIM key is an instant
# global email-forgery primitive.

Syslog                  yes
SyslogSuccess           yes
UMask                   007

# ---- Selector + domain -> key mapping ----
#
# Real ESPs rotate selectors quarterly. Each selector points to its
# own RSA-2048 keypair.  The public half is published as a TXT record
# at <selector>._domainkey.<domain>.  The private half lives under
# /etc/opendkim/keys/ on the signing host.
KeyTable                /etc/opendkim/key.table
SigningTable            refile:/etc/opendkim/signing.table
ExternalIgnoreList      /etc/opendkim/trusted.hosts
InternalHosts           /etc/opendkim/trusted.hosts

Mode                    sv     # s=sign outbound, v=verify inbound
Socket                  inet:12301@localhost
PidFile                 /run/opendkim/opendkim.pid
UserID                  opendkim:opendkim
Canonicalization        relaxed/simple
Selector                ss2026q2
MinimumKeyBits          1024
SignatureAlgorithm      rsa-sha256
SubDomains              no
AutoRestart             yes
AutoRestartRate         10/1h

# ---- Body-hash + header-field selection ----
#
# Headers signed by default: From, Reply-To, Subject, Date,
# Message-ID, To, Cc, MIME-Version, Content-Type, Content-Transfer-
# Encoding, List-Unsubscribe, List-Id. Oversigning included to block
# downgrade attacks via header injection.
OversignHeaders         From
SignHeaders             From,Reply-To,Subject,Date,Message-ID,To,Cc,MIME-Version,Content-Type,Content-Transfer-Encoding,List-Unsubscribe,List-Id

# ---- Reporting ----
#
# Aggregate + failure DMARC reports parsed by the reporting milter
# pair (opendmarc + custom report consumer at the ESP).
SendReports             yes
ReportAddress           dmarc-reports@corp.example.com

# ---- Key rotation drill ----
#
# Quarterly:
#   1. Generate new keypair:
#      opendkim-genkey -b 2048 -d corp.example.com -s ss2026q3 -D /etc/opendkim/keys
#   2. Publish new TXT at ss2026q3._domainkey with "p=<pubkey>"
#   3. Wait for DNS propagation + consumer caches (48h)
#   4. Flip Selector directive to ss2026q3, opendkim -HUP
#   5. Leave old selector TXT in place 30 days for in-flight mail
#   6. Delete old selector TXT + key file
#
# DKIM specifically was designed with short-lived selectors because
# leaked private keys are the classic failure mode; a factoring break
# is the same failure mode achieved analytically.

# ---- Breakage ----
#
# Every email a factored DKIM key ever signed — and every email an
# attacker signs going forward until the selector is retracted and
# DNS fully re-propagates — is indistinguishable from legitimate mail
# in the eyes of Gmail/O365/Apple's DMARC enforcement. Phishing
# becomes trivially end-to-end authentic-appearing, including "sent
# by your bank / your CEO / IRS" with full DMARC pass.  The DMARC
# reject ecosystem that underpins trust in email today rests entirely
# on DKIM RSA private keys remaining mathematically secure.
