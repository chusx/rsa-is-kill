! Cisco IOS / IOS XE PKI enrollment config — copy-pasted into thousands of
! enterprise edge routers, campus cores, and SD-WAN vEdges. The `crypto pki`
! subsystem drives the RSA keygen + SCEP enrollment whose primitives live
! alongside this file.
!
! Operators: essentially every Fortune 500 enterprise with Cisco iron
! (banks, telcos, federal civilian agencies running ISR 4000/Catalyst
! 8000/ASR 1000). The router authenticates VPN peers, 802.1X supplicants,
! NETCONF/RESTCONF clients, and SSH management sessions with the resulting
! device cert.

hostname edge-rtr-nyc-07
ip domain name corp.example.com

! ---- 1. Per-device RSA keypair in NVRAM-backed crypto store ----
crypto key generate rsa general-keys label EDGE-ID modulus 2048 exportable
!  (newer platforms with a TAM module: `on tam` keeps key in hardware)

! ---- 2. Define the enterprise CA trustpoint (SCEP to a Windows ADCS or
!        ISE Internal CA) ----
crypto pki trustpoint CORP-ISSUING-CA
 enrollment url http://ca.corp.example.com:80/certsrv/mscep/mscep.dll
 subject-name CN=edge-rtr-nyc-07.corp.example.com,OU=WAN,O=Corp,C=US
 rsakeypair EDGE-ID
 fqdn edge-rtr-nyc-07.corp.example.com
 revocation-check crl
 auto-enroll 70 regenerate        ! re-enroll at 70% of cert lifetime
 password 7 094F471A1A0A          ! SCEP challenge (type-7 obfuscated)

! ---- 3. Authenticate + enroll (runs once per box at provisioning) ----
!   router# crypto pki authenticate CORP-ISSUING-CA
!   router# crypto pki enroll       CORP-ISSUING-CA

! ---- 4. Consumers of the device cert ----

! 4a. IKEv2 site-to-site VPN to DC hub
crypto ikev2 profile IKEV2-HUB
 match identity remote fqdn hub.corp.example.com
 identity local fqdn edge-rtr-nyc-07.corp.example.com
 authentication remote rsa-sig
 authentication local  rsa-sig
 pki trustpoint CORP-ISSUING-CA

! 4b. SSH server host-key binding
ip ssh rsa keypair-name EDGE-ID
ip ssh version 2

! 4c. NETCONF/RESTCONF over TLS
netconf-yang
restconf
ip http secure-trustpoint CORP-ISSUING-CA
ip http secure-server

! 4d. 802.1X authenticator — router acts as RADIUS client with its
!     device cert for RadSec (RADIUS over TLS) to ISE
radius server ISE-1
 address ipv4 10.10.0.14 auth-port 2083 acct-port 2083
 tls connectiontimeout 5
 tls trustpoint client CORP-ISSUING-CA
 tls trustpoint server CORP-ROOT-CA

! A factoring attack invalidates every identity above simultaneously:
! impersonated edge routers join the hub mesh, forged ISE/RADIUS certs
! hijack 802.1X authentication, forged mgmt certs let NETCONF config-push
! sessions land on attacker-controlled devices that look authentic to
! NSO/Crosswork.
