# pg_hba.conf + postgresql.conf TLS snippets — how Postgres actually
# invokes the RSA primitives in `pg_rsa_client_auth.c`.
#
# Postgres is the database-of-record at: Stripe, Cloudflare,
# Instagram/Meta, Apple iTunes, Robinhood, every RDS Postgres
# instance, Aurora Postgres, Heroku, Supabase, Neon, Crunchy, Cloud
# SQL, Azure Database for PostgreSQL. Hundreds of thousands of
# production clusters rely on the TLS stack exercised here.

# --------------------------------------------------------------------
# postgresql.conf (TLS-related subset)
# --------------------------------------------------------------------
#
# ssl = on
# ssl_cert_file    = '/etc/postgresql/17/main/server.crt'   # RSA-2048 leaf
# ssl_key_file     = '/etc/postgresql/17/main/server.key'
# ssl_ca_file      = '/etc/postgresql/17/main/ca.crt'        # client cert root
# ssl_crl_file     = '/etc/postgresql/17/main/crl.pem'
# ssl_min_protocol_version = 'TLSv1.2'
# ssl_ciphers      = 'HIGH:MEDIUM:+3DES:!aNULL'
# ssl_prefer_server_ciphers = on
# password_encryption = scram-sha-256
# ssl_passphrase_command = '/usr/local/bin/sss-get-key-password %p'
#
# Real deployments swap the file-based key for an HSM PKCS#11 URL
# (RDS Proxy, Cloud SQL IAM auth, Aurora Serverless v2) and invoke
# the RSA private key via the OpenSSL engine rather than from disk.

# --------------------------------------------------------------------
# pg_hba.conf (the auth policy)
# --------------------------------------------------------------------
#
# Every line is: TYPE DATABASE USER ADDRESS METHOD [OPTIONS]

# ---- Local-only superuser auth via Unix domain socket + peer ----
local   all             postgres                                peer
local   all             all                                     peer

# ---- App tier: TLS + SCRAM-SHA-256 password auth ----
#
# Apps behind the RDS Proxy / bouncer connect here. TLS is mandatory
# to prevent plaintext-password interception; SCRAM mutual-auth
# guards against rogue servers even if TLS is compromised — but the
# server still needs a valid RSA cert to advertise TLS.
hostssl app_db          app_rw          10.10.0.0/16            scram-sha-256

# ---- Replication streaming: cert + CN-based auth ----
#
# Replicas connect with their own RSA-2048 client cert minted under
# the same enterprise CA. `cert clientcert=verify-full` requires the
# client to present a cert whose CN matches the connecting user.
hostssl replication     replicator      10.10.0.0/16            cert    clientcert=verify-full

# ---- Read-only analytics:  client cert + SCRAM double-auth ----
hostssl analytics_db    analytics_ro    10.30.0.0/16            cert    clientcert=verify-full

# ---- Admin bastion: requires client cert issued by the Platform PKI
#      AND MFA token via PAM ----
hostssl all             platform_admin  10.99.99.0/24           pam     pamservice=postgres-mfa
                                                                     clientcert=verify-full

# ---- Hard deny everything else (no password fallback) ----
hostnossl all           all             all                     reject
host     all            all             all                     reject

# --------------------------------------------------------------------
# Ops integration
# --------------------------------------------------------------------
#
# - `ssl_passphrase_command` pulls the private-key passphrase at
#   startup from a sidecar that retrieves it from HashiCorp Vault
#   / AWS Secrets Manager.
# - Cert renewal is driven by cert-manager / step-ca; postgres is
#   SIGHUP'd (pg_reload_conf()) to re-read without dropping
#   connections.
# - Client certs for the replication role are issued by a separate
#   intermediate so their revocation can be handled independently
#   of customer TLS certs.
#
# --------------------------------------------------------------------
# Breakage
# --------------------------------------------------------------------
#
# An RSA factoring attack against the enterprise CA that signs
# Postgres server + client certs lets an attacker:
#   - Stand up a rogue Postgres TLS endpoint identical to the
#     production one; app connections with SSLMODE=require fall
#     for it and leak SCRAM exchanges (channel binding requires
#     SSLMODE=verify-ca + scram-sha-256-plus; not universally
#     deployed).
#   - Mint replication client certs and join the replication
#     topology as a rogue standby, tail the WAL stream in real
#     time (every row of every write), or push a poisoned WAL
#     record to peers.
#   - Mint admin client certs and authenticate as platform_admin,
#     bypassing MFA in deployments that allow client-cert-only.
#
# At managed-Postgres-provider scale (RDS / Aurora / Cloud SQL), one
# provider-level CA signs tens of millions of instances' server
# certs. A factoring break on that CA is an industry-wide incident.
