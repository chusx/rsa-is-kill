# ipsec.conf — libreswan IKEv2 site-to-site + roadwarrior config,
# driving RSA-signed IKEv2 authentication via the primitives in
# `rsasigkey_ikev2.c`.
#
# Libreswan is shipped by default on RHEL / Rocky / Alma / Oracle Linux,
# SUSE, CentOS Stream, and in FIPS-validated form on the DoD NIPRNet
# edge. Strongswan ipsec.conf is nearly identical; the same config
# pattern applies there.
#
# Real deployments using this exact shape:
#   - Every federal agency IPsec enclave (HSPD-12 / NIST SP 800-77
#     mandates IPsec for controlled unclassified movement)
#   - Enterprise WAN mesh connecting cloud VPCs back to on-prem
#     data centers (AWS Site-to-Site VPN endpoints support
#     libreswan on the customer side)
#   - Classified IC networks (over HAIPE gateways at the next
#     layer up)

config setup
    protostack=netkey
    logfile=/var/log/pluto.log
    plutodebug=control
    uniqueids=yes

# ---- Default conn parameters (RSA-based authN, AES-GCM + ESP) ----
conn %default
    keyingtries=%forever
    replay-window=128
    ike=aes256-sha256-modp3072,aes256-sha384-prime256v1
    esp=aes_gcm256-null,aes256-sha256
    ikev2=insist                     # refuse IKEv1 fallback
    authby=rsasig                    # RSA-2048 PKCS#1 v1.5 or PSS
    rsasigkey=%cert                  # read pubkey from cert
    pfs=yes
    dpddelay=30
    dpdtimeout=120

# ---- Site-to-site between two enterprise gateways ----
#
# Each side has a long-lived X.509 cert + RSA keypair from the
# enterprise PKI.  Peer cert is pinned via `leftcert`/`rightcert`
# labels; revocation checked against a locally cached CRL.
conn nyc-to-lon
    left=203.0.113.17
    leftid=@gw-nyc.vpn.corp.example.com
    leftcert=gw-nyc                  # NSSDB nickname
    leftrsasigkey=%cert
    leftsubnet=10.10.0.0/16

    right=198.51.100.42
    rightid=@gw-lon.vpn.corp.example.com
    rightcert=gw-lon
    rightrsasigkey=%cert
    rightsubnet=10.20.0.0/16

    auto=start
    compress=no
    fragmentation=yes
    rekey=yes
    rekeymargin=9m
    salifetime=8h
    ikelifetime=1d

# ---- Remote-access roadwarrior template.  Client certs issued by
#      the enterprise Issuing CA, private key on the laptop in a
#      libsecret-protected NSSDB or the TPM EK-bound keyhandle. ----
conn roadwarrior
    left=%defaultroute
    leftid=@gw-vpn.corp.example.com
    leftcert=gw-vpn
    leftsubnet=0.0.0.0/0
    rightca=%same                    # require client cert from same root
    right=%any
    rightaddresspool=10.99.0.0/16
    modecfgdns=10.0.0.2,10.0.0.3
    auto=add
    ikev2=insist

# ---- AWS Site-to-Site IPsec (common hybrid pattern) ----
#
# AWS uses ECDSA on newer VPN endpoints but RSA-2048 PSK+cert is still
# the default for tunnels created before 2024-06.  Edit the conn to
# match.
conn aws-vpc-east-1-tunnel-1
    left=%defaultroute
    leftid=203.0.113.17
    leftauth=rsasig
    leftcert=gw-corp
    right=54.239.31.101
    rightauth=psk
    auto=start

# ---- Breakage ----
#
# Libreswan/strongswan IPsec mesh is one of the dominant WAN-
# authentication fabrics in every large enterprise. An RSA
# factoring attack against the enterprise PKI (or, for AWS
# tunnels, against the customer gateway cert) lets an attacker:
#   - Impersonate a gateway and bring up a fake site-to-site
#     tunnel that the legitimate peer accepts, silently
#     tapping or altering inter-site traffic.
#   - Drop a forged client cert on any laptop and establish a
#     remote-access VPN session indistinguishable from the real
#     employee's; the AAA logs show the legitimate Subject DN.
# IPsec's encryption layer still uses AES-GCM so recorded traffic
# isn't automatically decryptable — but PFS-disabled configs (many
# legacy DMVPN / Cisco ASA migrations kept PFS off for throughput)
# lose forward secrecy entirely under an RSA break.
