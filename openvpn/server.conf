# server.conf — OpenVPN 2.6 server config with cert-based auth. Drives
# the RSA verify + RSA-PSS sign paths in `ssl_openssl_rsa.c`.
#
# OpenVPN Community Edition is the #1 self-hosted VPN across:
#   - SMBs (Access Server commercial + CE)
#   - Privacy-VPN providers: Mullvad, ProtonVPN, IVPN, Private
#     Internet Access, NordVPN (Wireguard has eaten ~half, but
#     OpenVPN remains the compat path for restrictive networks)
#   - pfSense / OPNsense firewalls (millions of small-business
#     site-to-site and remote-access deployments)
#   - Synology/QNAP NAS VPN server, UniFi Dream Machine UDM-Pro
# CE plus the OpenVPN Access Server fork carry essentially identical
# TLS stacks.

# ---- Network topology ----
port 1194
proto udp
dev tun
topology subnet
server 10.8.0.0 255.255.255.0
ifconfig-pool-persist /var/log/openvpn/ipp.txt
push "redirect-gateway def1 bypass-dhcp"
push "dhcp-option DNS 10.8.0.1"
keepalive 10 120

# ---- TLS ----
#
# The RSA cert pair — server cert, CA, optional CRL — is the trust
# core.  easy-rsa generates these by default, but every production
# deployment moves to an enterprise PKI.
ca        /etc/openvpn/server/ca.crt
cert      /etc/openvpn/server/server.crt
key       /etc/openvpn/server/server.key          # RSA-2048 private
dh        /etc/openvpn/server/dh2048.pem          # optional w/ TLS 1.3
crl-verify /etc/openvpn/server/crl.pem

# ---- Hardening directives ----
remote-cert-tls client
tls-version-min 1.2
tls-cipher TLS-ECDHE-RSA-WITH-AES-256-GCM-SHA384:TLS-ECDHE-ECDSA-WITH-AES-256-GCM-SHA384
auth SHA256
cipher AES-256-GCM
ncp-ciphers AES-256-GCM:AES-128-GCM

# ---- HMAC-based firewalling on the control channel ----
#
# `tls-crypt-v2` is the modern replacement for `tls-auth` — gives
# every client a distinct wrapping key so server admins can revoke
# individual clients' control-channel access without rotating the
# shared key for everyone. The wrapping key is still RSA-enveloped
# when distributed.
tls-crypt-v2 /etc/openvpn/server/server-tls-crypt-v2.key

# ---- Script-based bookkeeping ----
client-connect    /etc/openvpn/scripts/on_connect.sh
client-disconnect /etc/openvpn/scripts/on_disconnect.sh

verify-client-cert require
# Enforce that the client cert's Subject includes a valid employee
# UPN; cross-checks against an LDAP allowlist in the connect
# script (sync'd from HRIS terminations every 5 min).
username-as-common-name

# ---- Log + persist ----
status      /var/log/openvpn/openvpn-status.log
log-append  /var/log/openvpn/openvpn.log
verb 4
user  nobody
group nobody
persist-key
persist-tun

# ---- Breakage ----
#
# An OpenVPN deployment is held together by exactly one thing: the
# server's CA RSA key.  A factoring attack against that key lets an
# attacker:
#   - Mint arbitrary client certs and connect as any employee to the
#     corporate VPN, inheriting whatever internal ACLs their Subject
#     DN maps to.
#   - Mint a server cert and stand up a rogue OpenVPN concentrator
#     that the legitimate clients connect to — harvesting IdP
#     tokens, SaaS cookies, and internal DNS / intranet traffic
#     from the session.
# Privacy-VPN providers with a single RSA CA signing every exit node
# are a particular concentration: factor the provider's CA and every
# customer's session becomes MITM-able to that same attacker
# indefinitely. VPN CRL propagation is slow (minutes to hours),
# so even after detection there's a window of exploitation.
