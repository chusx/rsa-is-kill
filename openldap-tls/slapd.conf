# slapd.conf — OpenLDAP directory server TLS + SASL/EXTERNAL config.
# Drives the TLS handshake code in `openldap_sasl_tls.c`.
#
# OpenLDAP slapd is the reference LDAP v3 server; production
# deployments include:
#   - Red Hat Directory Server (389 DS fork, same TLS engine via
#     Mozilla NSS)
#   - Symas OpenLDAP Enterprise — core Active-Directory-free
#     enterprise identity platform at hundreds of Fortune-1000s
#   - FreeIPA / Red Hat IdM (389 DS backend)
#   - OpenDJ / ForgeRock DS (different impl but same TLS stance)
#   - SUSE Linux UID / Apple Open Directory (historical
#     OpenLDAP-rooted)
# Client side: every nss-pam-ldapd / sssd / winbind / Samba AD DC
# authenticates AD-integrated logins through TLS to one of these.

# ---- Schema + modules ----
include         /etc/openldap/schema/core.schema
include         /etc/openldap/schema/cosine.schema
include         /etc/openldap/schema/inetorgperson.schema
include         /etc/openldap/schema/nis.schema
moduleload      back_mdb.la
moduleload      syncprov.la
moduleload      accesslog.la

pidfile         /var/run/openldap/slapd.pid
argsfile        /var/run/openldap/slapd.args

# ---- TLS ----
#
# Directory server cert issued under the enterprise Issuing CA;
# reused on StartTLS (389), LDAPS (636), and replication (syncrepl)
# channels. Client cert trust anchor is the same enterprise root so
# SASL/EXTERNAL works.
TLSCACertificateFile    /etc/openldap/certs/enterprise-ca-chain.pem
TLSCertificateFile      /etc/openldap/certs/ldap.corp.example.com.crt
TLSCertificateKeyFile   /etc/openldap/certs/ldap.corp.example.com.key   # RSA-2048
TLSProtocolMin          3.3       # TLS 1.2
TLSCipherSuite          HIGH:!aNULL:!MD5:!RC4
TLSVerifyClient         try       # allow anon TLS or client-cert TLS

# ---- SASL mechanisms ----
#
# SASL/GSSAPI hooks Kerberos (for AD-bridged logins); SASL/EXTERNAL
# maps the TLS client cert Subject DN into an ldap:///... authzID.
# authz-regexp rules below take DN -> uid.
sasl-host       ldap.corp.example.com
sasl-realm      CORP.EXAMPLE.COM
sasl-secprops   noplain,noanonymous

authz-regexp "cn=([^,]+),ou=people,o=corp,c=us"
             "ldap:///ou=people,o=corp,c=us??sub?(uid=$1)"

authz-regexp "cn=([^,]+),ou=services,o=corp,c=us"
             "ldap:///ou=services,o=corp,c=us??sub?(cn=$1)"

# ---- MDB backend + replication ----
database        mdb
directory       /var/lib/openldap-data
suffix          "o=corp,c=us"
maxsize         10737418240

rootdn          "cn=directory manager,o=corp,c=us"
rootpw          {SSHA}...

# ---- Delta-syncrepl multi-master mesh ----
#
# Each peer authenticates over TLS with its *own* RSA-2048 server
# cert; replication accounts use SASL/EXTERNAL bound against the DN
# embedded in the peer's cert. A factoring attack on the enterprise
# CA lets an attacker join the replication mesh as a synthetic peer
# and push arbitrary directory updates (new group memberships,
# replaced password hashes, phantom user accounts).
syncrepl        rid=001
                provider=ldaps://ldap-dc2.corp.example.com:636
                type=refreshAndPersist
                retry="60 +"
                searchbase="o=corp,c=us"
                schemachecking=on
                bindmethod=sasl
                saslmech=external
                tls_cert=/etc/openldap/certs/ldap.corp.example.com.crt
                tls_key=/etc/openldap/certs/ldap.corp.example.com.key
                tls_cacert=/etc/openldap/certs/enterprise-ca-chain.pem

mirrormode      on

# ---- Access control ----
access to attrs=userPassword
        by self        write
        by anonymous   auth
        by dn.regex="cn=admins,ou=groups,o=corp,c=us" write
        by *           none

access to *
        by self                write
        by dn.regex="cn=admins,ou=groups,o=corp,c=us" write
        by users               read
        by anonymous           auth

# ---- Breakage footprint ----
#
# LDAP is the primary identity store in a huge fraction of Unix
# enterprises and the heart of FreeIPA / RHIdM. A factoring attack
# against the enterprise CA used for server + replication certs:
#   - Enables a forged LDAPS server that receives plaintext LDAP
#     BIND passwords (TLS is what kept SIMPLE BIND safe on 389/636)
#   - Enables a rogue replica injecting identity records — phantom
#     Domain Admins, sudoers overrides, altered SSH authorized keys
#     (if they live in LDAP attributes)
#   - Enables SASL/EXTERNAL impersonation: any user-DN cert can be
#     forged, bypassing service-account controls against the
#     directory.
